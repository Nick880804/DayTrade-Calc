<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台股當沖計算機器</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: #f5f7fa;
      padding: 16px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      max-width: 1200px;
      margin: auto;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, .08);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 12px;
    }

    h3 {
      margin-top: 16px;
    }

    label {
      font-size: 15px;
      margin-top: 6px;
      display: block;
    }

    input {
      padding: 6px;
      margin-top: 4px;
      width: 97%;
    }

    button {
      padding: 10px 15px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 20px;
    }

    th,
    td {
      border-bottom: 1px solid #e5e7eb;
      padding: 6px;
      text-align: right;
    }

    th {
      background: #f1f5f9;
    }

    .left {
      text-align: left;
    }

    .danger {
      color: #dc2626;
      cursor: pointer;
    }

    .profit {
      color: #dc2626;
    }

    .loss {
      color: #16a34a;
    }

    .scroll-box {
      max-height: 300px;
      overflow-y: auto;
    }

    .tick-controls {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }

    .tick-button {
      flex: 1;
      padding: 4px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: #f1f5f9;
      cursor: pointer;
      text-align: center;
    }

    .num-pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      margin-top: 1px;
    }

    .num-pad button {
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      color: #000;
      background: #f1f5f9;
      border: 1px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
    }

    .num-pad-row-4 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      margin-top: 4px;
    }
  </style>
</head>

<body>

  <div class="layout">

    <!-- LEFT PANEL -->
    <div class="card">
      <h1>加倉 / 場上部位</h1>

      <label>成交價</label>
      <input id="price" type="number" step="any" onkeydown="if(event.key==='Enter'){addPosition();}">
      <div class="tick-controls">
        <div class="tick-button" onclick="adjustPrice(-1)">-</div>
        <div class="tick-button" onclick="adjustPrice(1)">+</div>
      </div>

      <div class="num-pad">
        <button onclick="appendPrice(1)">1</button>
        <button onclick="appendPrice(2)">2</button>
        <button onclick="appendPrice(3)">3</button>
        <button onclick="appendPrice(4)">4</button>
        <button onclick="appendPrice(5)">5</button>
        <button onclick="appendPrice(6)">6</button>
        <button onclick="appendPrice(7)">7</button>
        <button onclick="appendPrice(8)">8</button>
        <button onclick="appendPrice(9)">9</button>
        <button onclick="appendPrice('.')">.</button>
        <button onclick="appendPrice(0)">0</button>
        <button onclick="deletePrice()">DEL</button>
      </div>

      <label>張數（預設 1 張）</label>
      <input id="lots" type="number" value="1" min="1" onkeydown="if(event.key==='Enter'){addPosition();}">
      <div class="tick-controls">
        <div class="tick-button" onclick="adjustLots(-1)">-</div>
        <div class="tick-button" onclick="adjustLots(1)">+</div>
      </div>

      <button onclick="addPosition()">新增部位 / 加倉</button>

    </div>

    <!-- RIGHT PANEL -->
    <div class="card">
      <h1>總結資訊 & 損益</h1>

      <!-- 總結資訊 + 加倉明細 -->
      <div id="summary"></div>

      <h3>加倉明細</h3>
      <table id="positionsTable"></table>

      <h3>各價位出場損益</h3>
      <div class="scroll-box">
        <table id="resultTable"></table>
      </div>
    </div>

  </div>

  <script>
    const FEE_RATE = 0.000851954;
    const TAX_RATE = 0.0015;
    const LOT_SHARES = 1000;
    const FULL_TICK_RANGE = 30;

    let positions = [];

    function appendPrice(val) {
      const input = document.getElementById('price');
      if (val === '.' && input.value.includes('.')) return;
      input.value += val;
    }

    function deletePrice() {
      const input = document.getElementById('price');
      input.value = input.value.slice(0, -1);
    }

    function getTick(price) {
      if (price < 10) return 0.01;
      if (price < 50) return 0.05;
      if (price < 100) return 0.1;
      if (price < 500) return 0.5;
      if (price < 1000) return 1;
      return 5;
    }

    function adjustPrice(direction) {
      const priceInput = document.getElementById('price');
      const current = parseFloat(priceInput.value) || 0;
      const tick = getTick(current);
      const newPrice = current + tick * direction;
      const decimals = tick >= 1 ? 0 : tick.toString().split('.')[1].length;
      priceInput.value = newPrice.toFixed(decimals);
    }

    function adjustLots(direction) {
      const lotsInput = document.getElementById('lots');
      let current = parseInt(lotsInput.value) || 1;
      current += direction;
      if (current < 1) current = 1;
      lotsInput.value = current;
    }

    function addPosition() {
      const price = parseFloat(document.getElementById('price').value);
      const lots = parseInt(document.getElementById('lots').value);
      if (!price || !lots) return;
      positions.push({ price, shares: lots * LOT_SHARES });
      render();
    }

    function removePosition(index) {
      positions.splice(index, 1);
      render();
    }

    function calcTotal() {
      let shares = 0,
        cost = 0;
      positions.forEach(p => {
        shares += p.shares;
        cost += p.price * p.shares;
      });
      return { shares, cost, avg: cost / shares };
    }

    function fmt(num, tick = null) {
      if (tick) {
        const decimals = tick >= 1 ? 0 : tick.toString().split('.')[1].length;
        return Number(num).toFixed(decimals);
      }
      return Number(num).toLocaleString('en-US', { maximumFractionDigits: 3 });
    }

    function render() {
      if (!positions.length) {
        document.getElementById('positionsTable').innerHTML = '';
        document.getElementById('summary').innerHTML = '';
        document.getElementById('resultTable').innerHTML = '';
        return;
      }

      const total = calcTotal();
      const avgTick = getTick(total.avg);
      const basePrice = Math.round(total.avg / avgTick) * avgTick;

      // 加倉明細
      let pHtml = `<tr><th class="left">序</th><th>成交價</th><th>張數</th><th>刪</th></tr>`;
      positions.forEach((p, i) => {
        pHtml += `<tr><td class="left">${i + 1}</td><td>${fmt(p.price, getTick(p.price))}</td><td>${p.shares / LOT_SHARES}</td><td class="danger" onclick="removePosition(${i})">✕</td></tr>`;
      });
      document.getElementById('positionsTable').innerHTML = pHtml;

      // 總結資訊
      document.getElementById('summary').innerHTML =
        `<p>總張數：${total.shares / LOT_SHARES} ｜ 平均成本：${fmt(total.avg, avgTick)}</p>`;
      // 損益表
      let rHtml = `<tr><th class="left">賣出價</th><th>總損益</th></tr>`;
      for (let i = FULL_TICK_RANGE; i >= -FULL_TICK_RANGE; i--) {
        const sellPrice = basePrice + i * avgTick;
        const sellAmount = sellPrice * total.shares;
        const fee = (sellAmount + total.cost) * FEE_RATE;
        const tax = sellAmount * TAX_RATE;
        const profit = Math.round(sellAmount - total.cost - fee - tax);
        const cls = profit >= 0 ? 'profit' : 'loss';
        rHtml += `<tr><td class="left">${fmt(sellPrice, avgTick)}</td><td class="${cls}">${profit.toLocaleString()}</td></tr>`;
      }
      document.getElementById('resultTable').innerHTML = rHtml;

      // 滾動到平均成本附近
      const rows = document.querySelectorAll('#resultTable tr');
      const midIndex = FULL_TICK_RANGE + 1;
      const targetRow = rows[midIndex];
      if (targetRow) targetRow.scrollIntoView({ block: 'center' });
    }
  </script>

</body>

</html>
